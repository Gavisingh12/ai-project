# This Blueprint targets a free public demo deployment.
# It disables email verification so the app can run without SMTP on Render's free tier.
services:
  - type: web
    name: carecompass-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: APP_ENV_PRODUCTION
        value: "true"
      - key: FLASK_ENV
        value: production
      - key: ENABLE_DEV_ROUTES
        value: "false"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: REMEMBER_COOKIE_SECURE
        value: "true"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: carecompass-db
          property: connectionString
      - key: SITE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false

databases:
  - name: carecompass-db
    plan: free
