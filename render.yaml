# This Blueprint targets a stable public deployment.
# Render Free web services have important limitations, including SMTP restrictions
# and idle spin-down, so this setup uses paid-safe defaults.
services:
  - type: web
    name: carecompass-ai
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: APP_ENV_PRODUCTION
        value: "true"
      - key: FLASK_ENV
        value: production
      - key: ENABLE_DEV_ROUTES
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: REMEMBER_COOKIE_SECURE
        value: "true"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: carecompass-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

databases:
  - name: carecompass-db
    plan: basic-256mb
