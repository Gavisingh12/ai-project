{% extends "base.html" %}

{% block title %}Forgot Password | {{ app_name }}{% endblock %}
{% block scene_mode %}auth{% endblock %}

{% block content %}
  <section class="auth-shell narrow">
    <div class="auth-card tilt-card">
      <div class="panel-head">
        <div>
          <span class="eyebrow">Recovery</span>
          <h2>Reset your password</h2>
        </div>
      </div>
      <p class="section-copy">Enter your email and we will prepare a reset link for your account.</p>
      <form method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
          <span>Email address</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <button type="submit" class="button primary wide">Send reset link</button>
      </form>
      <div class="auth-meta">
        <a href="{{ url_for('auth.login') }}">Back to login</a>
      </div>
    </div>
  </section>
{% endblock %}
