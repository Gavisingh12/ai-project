{% extends "base.html" %}

{% block title %}Reset Password | {{ app_name }}{% endblock %}
{% block scene_mode %}auth{% endblock %}

{% block content %}
  <section class="auth-shell narrow">
    <div class="auth-card tilt-card">
      <div class="panel-head">
        <div>
          <span class="eyebrow">Recovery</span>
          <h2>Create a new password</h2>
        </div>
      </div>
      <p class="section-copy">Choose a new password to continue using your account.</p>
      <form method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
          <span>New password</span>
          <input type="password" name="password" required>
        </label>
        <label>
          <span>Confirm password</span>
          <input type="password" name="confirm_password" required>
        </label>
        <button type="submit" class="button primary wide">Update password</button>
      </form>
    </div>
  </section>
{% endblock %}
